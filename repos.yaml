# Benchmark targets for react-doctor-benchmarks.
#
# Schema: see scripts/lib/config.ts (validated by zod on load).
#
# Per-repo fields:
#   slug             (required) Filename-safe id, must be unique.
#   name             (required) Display name in the leaderboard.
#   githubUrl        (required) https://github.com/<owner>/<repo>
#   ref              Branch / tag / SHA to clone. Default: HEAD.
#   scanDir          Path inside the cloned repo to pass to react-doctor. Default: "."
#   project          --project arg passed to react-doctor (workspace project name).
#   packageManager   pnpm | npm | yarn | bun. Default: auto-detected from lockfile.
#   installArgs      Extra args appended to the install command.
#   skipDeadCode     true → pass --no-dead-code (avoids needing node_modules).
#   skipInstall      true → don't run install at all (implies skipDeadCode).
#   notes            Free-form human comment.

repos:
  # ── Ported from upstream millionco/react-doctor leaderboard-entries.ts ────────

  - slug: tldraw
    name: tldraw
    githubUrl: https://github.com/tldraw/tldraw
    project: tldraw

  - slug: excalidraw
    name: excalidraw
    githubUrl: https://github.com/excalidraw/excalidraw
    project: "@excalidraw/excalidraw"

  - slug: twenty
    name: twenty
    githubUrl: https://github.com/twentyhq/twenty
    project: twenty-front

  - slug: plane
    name: plane
    githubUrl: https://github.com/makeplane/plane
    project: web

  - slug: formbricks
    name: formbricks
    githubUrl: https://github.com/formbricks/formbricks
    project: "@formbricks/web"

  - slug: posthog
    name: posthog
    githubUrl: https://github.com/PostHog/posthog
    project: "@posthog/frontend"
    notes: Heavy install; falls back to --no-dead-code if it doesn't finish in time.

  - slug: supabase
    name: supabase
    githubUrl: https://github.com/supabase/supabase
    project: studio

  - slug: onlook
    name: onlook
    githubUrl: https://github.com/onlook-dev/onlook
    project: "@onlook/web-client"

  - slug: payload
    name: payload
    githubUrl: https://github.com/payloadcms/payload
    project: "@payloadcms/ui"

  - slug: sentry
    name: sentry
    githubUrl: https://github.com/getsentry/sentry
    project: sentry
    skipInstall: true
    notes: |
      Python+JS megarepo; npm/yarn deps require getsentry-specific tooling.
      We scan source-only (skipDeadCode forced via skipInstall).

  - slug: cal-com
    name: cal.com
    githubUrl: https://github.com/calcom/cal.com
    project: "@calcom/web"

  - slug: dub
    name: dub
    githubUrl: https://github.com/dubinc/dub
    project: web

  - slug: nodejs-org
    name: nodejs.org
    githubUrl: https://github.com/nodejs/nodejs.org
    project: "@node-core/website"
    notes: Upstream entry pointed at nodejs/node by mistake; corrected here.

  # ── 10 new entries added by react-doctor-benchmarks ──────────────────────────

  - slug: shadcn-ui
    name: shadcn/ui
    githubUrl: https://github.com/shadcn-ui/ui
    project: v4
    notes: Next.js docs site for the shadcn/ui component library (apps/v4).

  - slug: lobe-chat
    name: lobehub/lobe-chat
    githubUrl: https://github.com/lobehub/lobe-chat
    notes: Standalone Next.js LLM chat client.

  - slug: langfuse
    name: langfuse
    githubUrl: https://github.com/langfuse/langfuse
    project: web
    notes: Next.js LLM observability dashboard.

  - slug: unkey
    name: unkey
    githubUrl: https://github.com/unkeyed/unkey
    scanDir: web
    project: "@unkey/dashboard"
    notes: Next.js API-key management dashboard (lives under web/apps/dashboard).

  - slug: trigger-dev
    name: trigger.dev
    githubUrl: https://github.com/triggerdotdev/trigger.dev
    project: webapp
    notes: Remix-based background-jobs platform.

  - slug: typebot
    name: typebot
    githubUrl: https://github.com/baptisteArno/typebot.io
    project: builder
    notes: Next.js conversational form builder.

  - slug: medusa-admin
    name: medusajs/admin
    githubUrl: https://github.com/medusajs/medusa
    project: "@medusajs/dashboard"
    notes: Medusa v2 admin dashboard (React + Vite).

  - slug: appsmith
    name: appsmith
    githubUrl: https://github.com/appsmithorg/appsmith
    scanDir: app/client
    skipDeadCode: true
    notes: Large CRA-based React no-code platform; skip dead-code to keep CI bounded.

  - slug: tooljet
    name: tooljet
    githubUrl: https://github.com/ToolJet/ToolJet
    scanDir: frontend
    skipDeadCode: true
    notes: Internal-tools builder; large React frontend, skip dead-code.

  - slug: rocket-chat
    name: rocket.chat
    githubUrl: https://github.com/RocketChat/Rocket.Chat
    project: "@rocket.chat/meteor"
    skipDeadCode: true
    notes: Megarepo; we scan source-only.

  - slug: t3code
    name: t3code
    githubUrl: https://github.com/pingdotgg/t3code
    project: "@t3tools/web"
    notes: |
      Theo / ping.gg's t3code editor — the web frontend lives at apps/web
      under the @t3tools/monorepo workspace; uses bun lockfile.

  - slug: executor
    name: executor
    githubUrl: https://github.com/RhysSullivan/executor
    project: "@executor-js/local"
    notes: |
      Rhys Sullivan's local AI executor — apps/local is the Vite + React
      "web UI" the README describes; uses bun lockfile.
